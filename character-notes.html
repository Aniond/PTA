<style>
  .pta-notes-label {
    font-size: 9px;

    font-family: Georgia, serif;
    text-align: center;
    margin: 8px 0 4px 0;
  }
  .pta-notes-card {
    background: rgba(13,10,5,0.7);

  <div class="pta-notes-label">✦ Campaign Notes ✦</div>
  <div class="pta-notes-card">
    <richtextfield field="campaign_notes" label="" height="200px" placeholder="Session notes, important NPCs, plot threads..."></richtextfield>
  </div>

  <div class="pta-notes-label">✦ Relationships &amp; Rivals ✦</div>
  <div class="pta-notes-card">
    <richtextfield field="relationships" label="" height="140px" placeholder="Allies, rivals, gym leaders encountered..."></richtextfield>
  </div>

</div>
