<style>
  .pm-row {
    background: rgba(13,10,5,0.85);
    border: 1px solid rgba(200,40,40,0.2);
    border-left: 3px solid #c82828;
    border-radius: 2px;
    margin-bottom: 2px;
    padding: 4px;
  }
</style>

<script>
  // Roll this move.
  // In list-item context:
  //   `data`   = the full list-item record { _id, name, recordType, data: {move_type, ...} }
  //   `record` = the parent Pokémon record (with stats, types, etc.)
  function rollThisMove() {
    api.sendMessage("🟢 rollThisMove fired", undefined, [], []);

    // Move data — `data` is the full record, fields live at data.data
    var moveItem = (typeof data !== "undefined" && data) ? data : {};
    var moveFields = moveItem.data || {};
    var moveName = moveItem.name || "Move";
    var moveType = moveFields.move_type || "";
    var moveCat  = moveFields.move_category || "";
    var dmgDice  = moveFields.move_damage || "";

    // Parent Pokémon
    var parentRec  = (typeof record !== "undefined" && record) ? record : {};
    var parentData = parentRec.data || {};
    var pkName = parentRec.name || "Pokémon";
    var t1 = parentData.poke_type1 || "";
    var t2 = parentData.poke_type2 || "";

    // Choose modifier based on move category
    var modKey = "poke_atk_mod";
    if (moveCat && moveCat.indexOf("Special") >= 0) modKey = "poke_spatk_mod";
    else if (moveCat === "Effect") modKey = "poke_effect_mod";
    var mod = parseInt(parentData[modKey] || 0, 10);
    var sign = mod >= 0 ? "+" : "";

    api.sendMessage("🟢 about to roll: 1d20" + sign + mod + " for " + moveName, undefined, [], []);

    try {
      api.roll(
        "1d20" + sign + mod,
        {
          rollType: "accuracy",
          moveName: moveName,
          moveType: moveType,
          moveCategory: moveCat,
          actorName: pkName,
          attackerType1: t1,
          attackerType2: t2,
          damageRoll: dmgDice,
          recordId: parentRec._id
        }
      );
      api.sendMessage("🟢 api.roll returned successfully", undefined, [], []);
    } catch(e) {
      api.sendMessage("⚠️ api.roll threw: " + (e && e.message ? e.message : "unknown"), undefined, [], []);
    }
  }
</script>

<div class="pm-row">
  <div style="display: flex; flex-direction: row; gap: 6px; align-items: center;">
    <namefield field="name" label="" bold="true" size="xs" width="35%" placeholder="Move name..."></namefield>
    <stringfield field="move_type" label="" size="xs" width="18%" placeholder="Type"></stringfield>
    <stringfield field="move_category" label="" size="xs" width="22%" placeholder="Category"></stringfield>
    <stringfield field="move_damage" label="" size="xs" width="15%" placeholder="3d10"></stringfield>
    <button field="rollBtn" size="xs" label="🎲" variant="outline" onclick="rollThisMove();"></button>
  </div>
  <div style="display: flex; flex-direction: row; gap: 6px; margin-top: 3px;">
    <stringfield field="move_range" label="" size="xs" width="30%" placeholder="Range"></stringfield>
    <stringfield field="move_uses" label="" size="xs" width="20%" placeholder="Uses"></stringfield>
    <stringfield field="move_effect" label="" size="xs" multiline="true" maxrows="2" width="50%" placeholder="Effect..."></stringfield>
  </div>
</div>
