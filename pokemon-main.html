    font-size: 9px;
    letter-spacing: 3px;
    color: #c88080;
    text-transform: uppercase;
    font-family: Georgia, serif;
    text-align: center;
    margin: 8px 0 4px 0;
  }
  .pkm-card {
    background: rgba(13,10,5,0.7);
    border: 1px solid rgba(200,40,40,0.25);
    border-top: 2px solid rgba(200,40,40,0.55);
    border-radius: 3px;
    padding: 8px;
    margin-bottom: 4px;
  }
  .pkm-stat-cell {
    border-radius: 3px;
    padding: 4px 6px;
    text-align: center;
    flex: 1;
  }
  .pkm-stat-cell.hp   { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.2); }
  .pkm-stat-cell.atk  { background: rgba(216,56,56,0.12);   border: 1px solid rgba(216,56,56,0.4); }
  .pkm-stat-cell.def  { background: rgba(232,184,32,0.12);  border: 1px solid rgba(232,184,32,0.4); }
  .pkm-stat-cell.spatk { background: rgba(40,88,200,0.12);  border: 1px solid rgba(40,88,200,0.4); }
  .pkm-stat-cell.spdef { background: rgba(88,168,48,0.12);  border: 1px solid rgba(88,168,48,0.4); }
  .pkm-stat-cell.spd  { background: rgba(232,160,200,0.12); border: 1px solid rgba(232,160,200,0.4); }

    letter-spacing: 1px;
    text-transform: uppercase;

  .pkm-stat-lbl.hp    { color: #ccc; }
  .pkm-stat-lbl.atk   { color: #e88080; }
  .pkm-stat-lbl.def   { color: #e8c860; }
  .pkm-stat-lbl.spatk { color: #80a0e8; }
  .pkm-stat-lbl.spdef { color: #98d8a0; }
  .pkm-stat-lbl.spd   { color: #e8b0d0; }

    background: linear-gradient(90deg, rgba(42,74,158,0.15) 0%, rgba(200,40,40,0.1) 100%);
    border: 1px solid rgba(255,203,5,0.3);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
</style>

<script>
  var TYPE_COLORS = {
    "Normal":   "#a8a878", "Fire":    "#f08030", "Water":   "#6890f0",
    "Grass":    "#78c850", "Electric":"#f8d030", "Ice":     "#98d8d8",
    "Fighting": "#c03028", "Poison":  "#a040a0", "Ground":  "#e0c068",
    "Flying":   "#a890f0", "Psychic": "#f85888", "Bug":     "#a8b820",
    "Rock":     "#b8a038", "Ghost":   "#705898", "Dragon":  "#7038f8",
    "Dark":     "#705848", "Steel":   "#b8b8d0", "Fairy":   "#ee99ac"
  };

  var TYPE_NAMES = [
    "Normal","Fire","Water","Grass","Electric","Ice","Fighting","Poison",
    "Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"
  ];

  // ─── NATURES ───────────────────────────────────────────────────
  // Maps to the 20 PTA3 natures, in d20 order
  var NATURES = [
    { name: "Lonely",   inc: "Attack",          dec: "Defense" },
    { name: "Brave",    inc: "Attack",          dec: "Speed" },
    { name: "Adamant",  inc: "Attack",          dec: "Special Attack" },
    { name: "Naughty",  inc: "Attack",          dec: "Special Defense" },
    { name: "Bold",     inc: "Defense",         dec: "Attack" },
    { name: "Relaxed",  inc: "Defense",         dec: "Speed" },
    { name: "Impish",   inc: "Defense",         dec: "Special Attack" },
    { name: "Lax",      inc: "Defense",         dec: "Special Defense" },
    { name: "Timid",    inc: "Speed",           dec: "Attack" },
    { name: "Hasty",    inc: "Speed",           dec: "Defense" },
    { name: "Jolly",    inc: "Speed",           dec: "Special Attack" },
    { name: "Naive",    inc: "Speed",           dec: "Special Defense" },
    { name: "Modest",   inc: "Special Attack",  dec: "Attack" },
    { name: "Mild",     inc: "Special Attack",  dec: "Defense" },
    { name: "Quiet",    inc: "Special Attack",  dec: "Speed" },
    { name: "Rash",     inc: "Special Attack",  dec: "Special Defense" },
    { name: "Calm",     inc: "Special Defense", dec: "Attack" },
    { name: "Gentle",   inc: "Special Defense", dec: "Defense" },
    { name: "Sassy",    inc: "Special Defense", dec: "Speed" },
    { name: "Careful",  inc: "Special Defense", dec: "Special Attack" }
  ];

  // Map stat names to record fields
  var STAT_FIELD_MAP = {
    "Attack":          "poke_attack",
    "Defense":         "poke_defense",
    "Special Attack":  "poke_spatk",
    "Special Defense": "poke_spdef",
    "Speed":           "poke_speed"
  };

  function findNatureByName(name) {
    if (!name) return null;
    for (var i = 0; i < NATURES.length; i++) {
      if (NATURES[i].name === name) return NATURES[i];
    }
    return null;
  }

  function rollRandomNature() {
    var roll = Math.floor(Math.random() * 20) + 1; // 1-20
    var nature = NATURES[roll - 1];
    applyNature(nature, roll);
  }

  // Apply a nature: undo any previous nature's stat changes, then apply new +1/-1
  function applyNature(newNature, roll) {
    var d = (record && record.data) || {};
    var prevNatureName = d.poke_nature || "";
    var prevNature = findNatureByName(prevNatureName);

    var updates = {};

    // Undo previous nature (if any)
    if (prevNature) {
      var prevIncField = STAT_FIELD_MAP[prevNature.inc];
      var prevDecField = STAT_FIELD_MAP[prevNature.dec];
      if (prevIncField) {
        updates["data." + prevIncField] = parseInt(d[prevIncField] || 0, 10) - 1;
      }
      if (prevDecField) {
        updates["data." + prevDecField] = parseInt(d[prevDecField] || 0, 10) + 1;
      }
    }

    // Apply new nature
    var incField = STAT_FIELD_MAP[newNature.inc];
    var decField = STAT_FIELD_MAP[newNature.dec];
    // Use the (potentially-undone) values from updates if we already touched them, else current
    function curStat(field) {
      var key = "data." + field;
      if (updates.hasOwnProperty(key)) return updates[key];
      return parseInt(d[field] || 0, 10);
    }
    if (incField) {
      updates["data." + incField] = curStat(incField) + 1;
    }
    if (decField) {
      updates["data." + decField] = curStat(decField) - 1;
    }
    updates["data.poke_nature"] = newNature.name;

    api.setValues(updates);

    var msg = "## 🎲 Nature Roll\n" +
              "**" + (d.poke_nickname || record.name || "Pokémon") + "** rolled **" + roll + "** on the d20.\n" +
              "Nature: **" + newNature.name + "**\n" +
              "+1 " + newNature.inc + " / -1 " + newNature.dec;
    if (prevNature) {
      msg += "\n_(Previous **" + prevNature.name + "** nature reverted.)_";
    }
    api.sendMessage(msg, undefined, [], []);
  }

  // ─── TYPE BADGE CANVAS ─────────────────────────────────────────
  function drawTypeCanvas() {
    var c = api.getCanvas("typeCanvas");
    if (!c) return;
    var W = c.width, H = c.height;
    c.clearRect(0, 0, W, H);
    var d = (record && record.data) || {};
    var t1 = d.poke_type1 || "";
    var t2 = d.poke_type2 || "";
    var x = 4;
    function drawBadge(type, xPos) {
      if (!type) return xPos;
      var col = TYPE_COLORS[type] || "#555";
      var tw = c.measureText(type).width + 16;
      c.beginPath();
      c.roundRect(xPos, 2, tw, H - 4, 8);
      c.setFillStyle(col);
      c.fill();
      c.setFont("700 11px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.setFillStyle("#fff");
      c.setShadowColor("rgba(0,0,0,0.5)");
      c.setShadowBlur(2);
      c.fillText(type, xPos + tw / 2, H / 2);
      c.setShadowBlur(0);
      return xPos + tw + 6;
    }
    x = drawBadge(t1, x);
    drawBadge(t2, x);
  }

  // ─── LOAD FROM POKÉDEX (recordselectlist) ──────────────────────
  // recordselectlist passes selections as an array of record objects (or a single record)
  function onPokedexRowSelected(value) {
    if (!value) return;

    // Extract the picked record from various possible shapes
    var picked = null;
    if (Array.isArray(value)) {
      picked = value[value.length - 1]; // last selected
    } else if (typeof value === "object") {
      picked = value;
    } else if (typeof value === "string") {
      // It's an ID string — fetch via getRecord
      loadPokemonRecord(value);
      return;
    }

    if (!picked) return;

    // If we have the full record already, use it directly (faster path)
    if (picked.data) {
      handleLoadedRecord(picked);
      return;
    }

    // Otherwise extract an ID and load via getRecord
    var id = picked._id || picked.id || picked.value;
    if (id) {
      loadPokemonRecord(id);
    } else {
      api.sendMessage("⚠️ Couldn't extract record from selection.", undefined, [], []);
    }
  }

  function loadPokemonRecord(pokemonId) {
    api.getRecord("pokemon", pokemonId, function(srcRec) {
      if (!srcRec) {
        api.sendMessage("⚠️ Couldn't load that Pokémon record.", undefined, [], []);
        return;
      }
      handleLoadedRecord(srcRec);
    });
  }

  function handleLoadedRecord(srcRec) {
    if (!srcRec.data) {
      api.sendMessage("⚠️ Record loaded but contains no data.", undefined, [], []);
      return;
    }
    if (srcRec._id === record._id) {
      api.sendMessage("⚠️ Can't load Pokédex data from this same record.", undefined, [], []);
      return;
    }
    var d = (record && record.data) || {};
    var hasExisting = d.poke_hp || d.poke_attack;
    if (hasExisting) {
      api.showConfirm(
        "Overwrite Current Stats?",
        "Replace current stats with **" + (srcRec.name || "Pokémon") + "** Pokédex data? " +
        "(Nickname, gender, and held item will be preserved. Moves will be replaced.)",
        "Overwrite", "Cancel",
        function() { applyPokedexData(srcRec); }
      );
    } else {
      applyPokedexData(srcRec);
    }
  }

  function applyPokedexData(srcRec) {
    var s = srcRec.data || {};
    var srcName = srcRec.name || "Pokémon";

    var preserved = {
      nickname: (record.data && record.data.poke_nickname) || "",
      gender:   (record.data && record.data.poke_gender)   || "",
      held:     (record.data && record.data.held_item)     || ""
    };

    // Copy moves_list directly from the source record (now a real array from CSV import).
    // We assign fresh UUIDs so each Pokemon instance has unique list-item IDs.
    var srcMoves = Array.isArray(s.moves_list) ? s.moves_list : [];
    var movesList = srcMoves.map(function(m) {
      return {
        _id: generateUuid(),
        name: m.name,
        unidentifiedName: m.unidentifiedName || m.name,
        recordType: 'pokemon_move',
        identified: m.identified !== false,
        data: m.data ? {
          move_type:        m.data.move_type        || '',
          move_category:    m.data.move_category    || '',
          move_range:       m.data.move_range       || '',
          move_uses:        m.data.move_uses        || '',
          move_damage_dice: m.data.move_damage_dice || '',
          move_effect:      m.data.move_effect      || ''
        } : {}
      };
    });

    var updates = {
      "name": srcName,
      "data.poke_type1":    s.poke_type1    || "",
      "data.poke_type2":    s.poke_type2    || "",
      "data.poke_stage":    s.poke_stage    || "",
      "data.poke_size":     s.poke_size     || "",
      "data.poke_weight":   s.poke_weight   || "",
      "data.poke_hp":       parseInt(s.poke_hp || 0, 10),
      "data.hp_current":    parseInt(s.poke_hp || 0, 10),
      "data.poke_defense":  parseInt(s.poke_defense || 0, 10),
      "data.poke_spdef":    parseInt(s.poke_spdef || 0, 10),
      "data.poke_speed":    parseInt(s.poke_speed || 0, 10),
      "data.poke_speed_ft": parseInt(s.poke_speed_ft || 0, 10),
      "data.poke_attack":   parseInt(s.poke_attack || 0, 10),
      "data.poke_spatk":    parseInt(s.poke_spatk || 0, 10),
      "data.poke_atk_mod":    parseModifier(s.poke_atk_mod),
      "data.poke_spatk_mod":  parseModifier(s.poke_spatk_mod),
      "data.poke_effect_mod": parseModifier(s.poke_effect_mod),
      "data.poke_skills":           s.poke_skills           || "",
      "data.poke_stat_passives":    s.poke_stat_passives    || "",
      "data.poke_ability_passives": s.poke_ability_passives || "",
      "data.poke_diet":         s.poke_diet         || "",
      "data.poke_egg_group":    s.poke_egg_group    || "",
      "data.poke_hatch_rate":   s.poke_hatch_rate   || "",
      "data.poke_habitat":      s.poke_habitat      || "",
      "data.poke_evolution":    s.poke_evolution    || "",
      "data.poke_proficiencies": s.poke_proficiencies || "",
      "data.poke_nickname":  preserved.nickname,
      "data.poke_gender":    preserved.gender,
      "data.held_item":      preserved.held,
      // The full list of moves at once — proper Realm list structure
      "data.moves_list":     movesList,
      // Loyalty/Evolution: default to loyalty 2 (most common new Pokemon scenario)
      // and set "last evolved" date to today since this is essentially a new acquisition.
      "data.poke_loyalty":           2,
      "data.poke_loyalty_status":    "Obedient — workplace associates vibe, evolution unlocks",
      "data.poke_loyalty_notes":     "",
      "data.poke_last_evolved":      todayDateStr(),
      "data.poke_evolution_target":  parseNextEvolution(s.poke_evolution, srcName)
    };

    api.setValues(updates);

    api.sendMessage(
      "## 📥 Loaded " + srcName + " from Pokédex\n" +
      "Stats, passives, skills, biology, and " + movesList.length + " moves copied to **" +
      (preserved.nickname || srcName) + "**.",
      undefined, [], []
    );

    api.delay(function() { drawTypeCanvas(); }, 100);
  }

  // ─── DRAG-DROP HANDLER ─────────────────────────────────────────
  function onDrop(type, recordLink, sourceInfo) {
    if (type === "pokemon") {
      var id = recordLink && recordLink.value && recordLink.value._id;
      if (id) loadPokemonRecord(id);
    }
    // For "moves", Realm's built-in list drop handling takes over via allowedListTypes
  }

  // ─── Helpers ───────────────────────────────────────────────────
  function parseModifier(raw) {
    if (!raw) return 0;
    var str = String(raw).trim();
    if (str === "") return 0;
    if (str.charAt(0) === "+") str = str.substring(1);
    var n = parseInt(str, 10);
    return isNaN(n) ? 0 : n;
  }

  function todayDateStr() {
    var d = new Date();
    return d.getFullYear() + "-" +
      (d.getMonth() + 1 < 10 ? "0" : "") + (d.getMonth() + 1) + "-" +
      (d.getDate() < 10 ? "0" : "") + d.getDate();
  }

  function parseNextEvolution(chain, currentName) {
    if (!chain || !currentName) return "";
    var parts = String(chain).split(/\s+/).filter(function(x) { return x.length > 0; });
    var base = currentName.replace(/\s*\(.+\)\s*$/, "").trim();
    var idx = parts.indexOf(base);
    if (idx < 0 || idx >= parts.length - 1) return "";
    return parts[idx + 1];
  }

  // Per Sean: generate a random UUID for each list item's _id
  function generateUuid() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
      var r = Math.floor(Math.random() * 16);
      var v = c === "x" ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  function onLoad() { drawTypeCanvas(); }
  function onRecordChanged(event) { drawTypeCanvas(); }

  // ═══ LOYALTY SYSTEM ═══════════════════════════════════════════════
  var LOYALTY_STATUS = {
    0: "Disobedient — flees, attacks owner, won't share food",
    1: "Unfriendly — civil disobedience, rarely attacks",
    2: "Obedient — workplace associates vibe, evolution unlocks",
    3: "Trusting — naturally raised, players RP freely",
    4: "Devoted — very happy, would never be traded",
    5: "Bonded — perfect understanding, proactive partner"
  };

  function setLoyalty(level) {
    if (typeof level !== "number") level = parseInt(level, 10) || 0;
    if (level < 0) level = 0;
    if (level > 5) level = 5;
    var setObj = {
      "data.poke_loyalty": level,
      "data.poke_loyalty_status": LOYALTY_STATUS[level] || ""
    };
    api.setValues(setObj);
    var nm = (record && record.name) || "Pokémon";
    api.sendMessage("💖 " + nm + " — Loyalty set to " + level + " (" + LOYALTY_STATUS[level].split(" — ")[0] + ")", undefined, [], []);
  }

  function applyCaptureScenario(scenario) {
    if (!scenario) return;
    var STARTING_LOYALTY = {
      "unconscious": 0, "abused": 0,
      "luckycatch": 1, "outnumbered": 1, "trade": 1, "threatened": 1,
      "evenly_matched": 2, "hatched": 2, "breeding": 2, "starter": 2,
      "friendship": 2, "rescued": 2
    };
    var level = STARTING_LOYALTY[scenario];
    if (level === undefined) return;
    setLoyalty(level);
  }

  // ═══ EVOLUTION SYSTEM ═════════════════════════════════════════════
  function setEvolutionDateToday() {
    var d = new Date();
    var iso = d.getFullYear() + "-" +
      (d.getMonth() + 1 < 10 ? "0" : "") + (d.getMonth() + 1) + "-" +
      (d.getDate() < 10 ? "0" : "") + d.getDate();
    api.setValues({ "data.poke_last_evolved": iso });
    api.sendMessage("📅 Last evolution date set to " + iso, undefined, [], []);
  }

  function parseDateYMD(s) {
    if (!s) return null;
    var m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (!m) return null;
    return new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10));
  }

  function getNextEvolutionTarget() {
    var d = (record && record.data) || {};
    var chain = (d.poke_evolution || "").trim();
    if (!chain) return null;
    // Chain looks like "Charmander Charmeleon Charizard"
    var parts = chain.split(/\s+/).filter(function(x) { return x.length > 0; });
    var myName = (record && record.name) || "";
    // Strip any (form) suffix for matching
    var myBaseName = myName.replace(/\s*\(.+\)\s*$/, "").trim();
    var idx = parts.indexOf(myBaseName);
    if (idx < 0 || idx >= parts.length - 1) return null;
    return parts[idx + 1];
  }

  function checkEvolutionEligibility() {
    var d = (record && record.data) || {};
    var nm = (record && record.name) || "Pokémon";
    var loyalty = parseInt(d.poke_loyalty || 0, 10);
    var lastEv = parseDateYMD(d.poke_last_evolved || "");
    var msgs = [];
    msgs.push("🔍 **Evolution Eligibility Check: " + nm + "**");

    // Bug-types are 2-4 days, others a week
    var t1 = d.poke_type1 || "", t2 = d.poke_type2 || "";
    var isBug = (t1 === "Bug" || t2 === "Bug");
    var minDays = isBug ? 2 : 7;
    var dayLabel = isBug ? "2-4 days (Bug-type)" : "1 week";

    if (!lastEv) {
      msgs.push("⚠ Last evolved date not set — click '📅 Set Today' to mark hatch/evolution date.");
    } else {
      var now = new Date();
      var diffMs = now.getTime() - lastEv.getTime();
      var diffDays = Math.floor(diffMs / 86400000);
      if (diffDays >= minDays) {
        msgs.push("✓ Time requirement met: " + diffDays + " days since last evolution (need " + dayLabel + ")");
      } else {
        msgs.push("✗ Time requirement NOT met: only " + diffDays + " days since last evolution (need " + dayLabel + ")");
      }
    }

    if (loyalty >= 2) {
      msgs.push("✓ Loyalty requirement met: " + loyalty + " (need at least 2)");
    } else {
      msgs.push("✗ Loyalty requirement NOT met: " + loyalty + " (need at least 2)");
    }

    var target = d.poke_evolution_target || getNextEvolutionTarget();
    if (target) {
      msgs.push("→ Next form: **" + target + "**");
    } else {
      msgs.push("→ No further evolution detected in chain. (Final form?)");
    }

    msgs.push("");
    msgs.push("✦ Final requirement: 'Something awesome happened' (GM judgment call)");
    msgs.push("   Examples: defeated a tough foe • critical hit defeat • near-death survival •");
    msgs.push("   super-effective survival • milestone celebration • protective evolution in lethal moment");
    msgs.push("");
    msgs.push("If all conditions met and the GM approves, click '✨ Evolve Now!' to evolve.");

    api.sendMessage(msgs.join("\n"), undefined, [], []);
  }

  function evolvePokemon() {
    var d = (record && record.data) || {};
    var nm = (record && record.name) || "Pokémon";
    var loyalty = parseInt(d.poke_loyalty || 0, 10);

    if (loyalty < 2) {
      api.sendMessage("❌ Cannot evolve " + nm + " — loyalty must be at least 2 (currently " + loyalty + ")", undefined, [], []);
      return;
    }

    // Check for Everstone
    var heldItem = (d.held_item || "").toLowerCase();
    if (heldItem.indexOf("everstone") >= 0) {
      api.sendMessage("❌ " + nm + " is holding an Everstone and cannot evolve.", undefined, [], []);
      return;
    }

    var target = d.poke_evolution_target || getNextEvolutionTarget();
    if (!target) {
      api.sendMessage("❌ No evolution target set. Type the target Pokémon's name in 'Next Evolution Target' field, then try again.", undefined, [], []);
      return;
    }

    // Confirm with GM
    api.showConfirm(
      "Evolve " + nm + " → " + target + "?",
      "**" + nm + "** is about to evolve into **" + target + "**.\n\n" +
      "This will load " + target + "'s stats from the Pokédex, preserving:\n" +
      "• Nickname, gender, nature\n" +
      "• Loyalty (currently " + loyalty + ")\n" +
      "• HP ratio (current/max will scale proportionally)\n\n" +
      "**Important:** You need to open the **" + target + "** template from the Compendium first, " +
      "then come back here and click Evolve. Or use the Pokédex auto-fill instead — it will " +
      "replace this Pokémon's stats with the target's stats.\n\n" +
      "Proceed with evolution announcement only? (Stats won't change — use Pokédex auto-fill for that)",
      "Yes, Announce Evolution", "Cancel",
      function() { announceEvolution(nm, target); }
    );
  }

  function announceEvolution(oldName, newName) {
    var today = todayDateStr();
    var d = (record && record.data) || {};
    var preserveNickname = d.poke_nickname || "";

    api.setValues({
      "data.poke_last_evolved": today
    });

    var displayName = preserveNickname ? (preserveNickname + " (was " + oldName + ", now " + newName + ")") : newName;
    api.sendMessage("✨✨✨ **EVOLUTION!** ✨✨✨\n" +
      "**" + oldName + "** evolved into **" + displayName + "**!\n\n" +
      "📋 Next step: Open the **LOAD FROM POKÉDEX** accordion at the top of this sheet, " +
      "search for **" + newName + "**, and click to load its stats. " +
      "Nickname, nature, and gender will be preserved.\n\n" +
      "Last evolution date set to " + today + ".", undefined, [], []);
  }
</script>

<!-- ═══ POKEMON HEADER ═══ -->
