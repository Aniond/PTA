<style>
  .ab-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #c88080;
    text-transform: uppercase;
    font-family: Georgia, serif;
    text-align: center;
    margin: 8px 0 4px 0;
  }
  .ab-card {
    background: rgba(13,10,5,0.7);
    border: 1px solid rgba(200,40,40,0.25);
    border-top: 2px solid rgba(200,40,40,0.55);
    border-radius: 3px;
    padding: 8px;
    margin-bottom: 4px;
  }
  .ab-stat-cell {
    background: rgba(200,40,40,0.08);
    border: 1px solid rgba(200,40,40,0.3);
    border-radius: 3px;
    padding: 6px;
    text-align: center;
    flex: 1;
  }
  .ab-stat-lbl {
    font-size: 9px;
    color: #c88080;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
    font-weight: 600;
  }
</style>

<script>
  var CATEGORY_COLORS = {
    "Stat Passive":    "#c89030",
    "Ability Passive": "#9b5ade"
  };

  var TRIGGER_COLORS = {
    "HP Threshold":     "#d83838",
    "Triggered":        "#2858c8",
    "Passive":          "#58a830",
    "On Enter":         "#e8b820",
    "Status Condition": "#a040a0",
    "Weather":          "#6890f0",
    "End of Round":     "#705898",
    "Once Per Combat":  "#c03028",
    "Free Action":      "#a890f0",
    "Special":          "#ee99ac"
  };

  function drawAbilityBanner() {
    var c = api.getCanvas("abilityBanner");
    if (!c) return;
    var W = c.width, H = c.height;
    var d = (record && record.data) || {};
    var category = d.ability_category || "Stat Passive";
    var trigger  = d.ability_trigger || "Passive";
    var abName   = (record && record.name) || "Ability";

    var catCol  = CATEGORY_COLORS[category] || "#888";
    var trigCol = TRIGGER_COLORS[trigger]   || "#888";

    c.clearRect(0, 0, W, H);

    // Background gradient
    var grad = c.createLinearGradient(0, 0, W, 0, [
      [0,   catCol + "ff"],
      [0.5, catCol + "aa"],
      [1,   "rgba(13,10,5,0.85)"]
    ]);
    c.setFillStyle(grad || catCol);
    c.fillRect(0, 0, W, H);

    c.setStrokeStyle("rgba(0,0,0,0.5)");
    c.setLineWidth(2);
    c.strokeRect(1, 1, W-2, H-2);

    // Ability name
    c.setFont("700 22px Georgia, serif");
    c.setTextAlign("left");
    c.setTextBaseline("middle");
    c.setShadowColor("rgba(0,0,0,0.7)");
    c.setShadowBlur(3);
    c.setFillStyle("#ffffff");
    c.fillText(abName, 16, H / 2 - 6);
    c.setShadowBlur(0);

    // Pills row
    c.setFont("700 10px sans-serif");
    var pillY = H / 2 + 12;

    // Category pill
    var catW = c.measureText(category).width + 16;
    c.beginPath();
    c.roundRect(16, pillY - 8, catW, 16, 8);
    c.setFillStyle("rgba(0,0,0,0.5)");
    c.fill();
    c.setStrokeStyle("rgba(255,255,255,0.4)");
    c.setLineWidth(1);
    c.stroke();
    c.setFillStyle("#ffffff");
    c.setTextAlign("center");
    c.setTextBaseline("middle");
    c.fillText(category, 16 + catW/2, pillY);

    // Trigger pill
    var trigW = c.measureText(trigger).width + 16;
    var trigX = 16 + catW + 6;
    c.beginPath();
    c.roundRect(trigX, pillY - 8, trigW, 16, 8);
    c.setFillStyle(trigCol + "cc");
    c.fill();
    c.setStrokeStyle("rgba(255,255,255,0.4)");
    c.setLineWidth(1);
    c.stroke();
    c.setFillStyle("#ffffff");
    c.fillText(trigger, trigX + trigW/2, pillY);

    // Sparkle decoration in top-right
    var sparkleX = W - 30, sparkleY = H / 2 - 5;
    c.setFont("700 28px Georgia, serif");
    c.setTextAlign("center");
    c.setTextBaseline("middle");
    c.setShadowColor("rgba(255,255,255,0.8)");
    c.setShadowBlur(10);
    c.setFillStyle("#ffcb05");
    c.fillText("✦", sparkleX, sparkleY);
    c.setShadowBlur(0);
  }

  function onLoad() { drawAbilityBanner(); }
  function onRecordChange() { drawAbilityBanner(); }
</script>

<!-- ═══ ABILITY BANNER ═══ -->
<canvas field="abilityBanner" width="600" height="80"
  style="width: 100%; height: 80px; display: block; border-radius: 4px; margin-bottom: 8px;"
  onload="drawAbilityBanner();"
  onrecordchange="drawAbilityBanner();">
</canvas>

<!-- ═══ NAME ═══ -->
<namefield field="name" label="Ability Name" size="sm" placeholder="e.g. Overgrow..."></namefield>

<!-- ═══ CLASSIFICATION ═══ -->
<div class="ab-label">✦ Classification ✦</div>
<div class="ab-card">
  <div style="display: flex; flex-direction: row; gap: 4px;">
    <div class="ab-stat-cell">
      <div class="ab-stat-lbl">Category</div>
      <stringfield field="ability_category" label="" size="xs" width="100%"
        placeholder="Stat Passive / Ability Passive..."
        onchange="drawAbilityBanner();"></stringfield>
    </div>
    <div class="ab-stat-cell">
      <div class="ab-stat-lbl">Trigger</div>
      <stringfield field="ability_trigger" label="" size="xs" width="100%"
        placeholder="HP Threshold / Triggered / Passive..."
        onchange="drawAbilityBanner();"></stringfield>
    </div>
  </div>
</div>

<!-- ═══ EFFECT ═══ -->
<div class="ab-label">✦ Mechanical Effect ✦</div>
<div class="ab-card">
  <stringfield field="ability_effect" label="" size="xs" multiline="true" maxrows="6" width="100%"
    placeholder="When you are below 25% of your max HP, your Grass-type attacks deal +3 damage..."></stringfield>
</div>

<!-- ═══ FLAVOR DESCRIPTION ═══ -->
<div class="ab-label">✦ Flavor Description ✦</div>
<div class="ab-card">
  <stringfield field="ability_description" label="" size="xs" multiline="true" maxrows="4" width="100%"
    placeholder="The Pokémon's Grass-type moves surge with power as it nears defeat..."></stringfield>
</div>
