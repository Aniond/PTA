  .pta-stat-cell.atk { background: rgba(216,56,56,0.12); border-color: rgba(216,56,56,0.4); }
  .pta-stat-cell.def { background: rgba(232,184,32,0.12); border-color: rgba(232,184,32,0.4); }
  .pta-stat-cell.spatk { background: rgba(40,88,200,0.12); border-color: rgba(40,88,200,0.4); }
  .pta-stat-cell.spdef { background: rgba(88,168,48,0.12); border-color: rgba(88,168,48,0.4); }
  .pta-stat-cell.spd { background: rgba(232,160,200,0.12); border-color: rgba(232,160,200,0.4); }

    color: #c88080;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
    font-weight: 600;
  }

  .pta-stat-label.def { color: #e8c860; }
  .pta-stat-label.spatk { color: #80a0e8; }
  .pta-stat-label.spdef { color: #98d8a0; }

    background: rgba(255,255,255,0.02);

    margin-bottom: 2px;

</style>

<script>
  function rollSkill(skillName, statKey) {
    const d = (record && record.data) || {};
    const skillField = "skill_" + statKey.toLowerCase().replace(/[^a-z]/g, "_");
    const skillVal = parseInt(d[skillField] || 0, 10);
    const actorName = d.character_name || record.name || "Trainer";
    const sign = skillVal >= 0 ? "+" : "";
    api.promptRoll(
      `${actorName} — ${skillName}`,
      `1d20${sign}${skillVal}`,
      [],
      { rollType: "skill", skillName: skillName, actorName: actorName, recordId: record._id },
      "system"
    );
  }
</script>
